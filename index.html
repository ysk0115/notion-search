<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Widget</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #191919;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    width: 100%;
  }

  .search-wrapper {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    width: calc(100% - 32px);
  }

  .search-box {
    display: flex;
    align-items: center;
    background: #252525;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 13px 18px;
    gap: 12px;
    flex: 1;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-box:focus-within {
    border-color: #505050;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
  }

  .search-icon {
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    opacity: 0.5;
    transition: opacity 0.2s;
  }

  .search-box:focus-within .search-icon { opacity: 0.85; }

  .search-input {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 300;
    color: #d0d0d0;
    background: transparent;
    min-width: 0;
    letter-spacing: 0.01em;
  }

  .search-input::placeholder { color: #404040; }

  .clear-btn {
    flex-shrink: 0;
    background: none;
    border: none;
    cursor: pointer;
    color: #505050;
    display: none;
    align-items: center;
    padding: 0;
    transition: color 0.15s;
  }
  .clear-btn:hover { color: #999; }
  .clear-btn.visible { display: flex; }

  .search-btn {
    flex-shrink: 0;
    background: none;
    border: none;
    cursor: pointer;
    color: #505050;
    display: flex;
    align-items: center;
    padding: 0;
    transition: color 0.15s;
  }
  .search-btn:hover { color: #aaa; }

  .search-group {
    flex: 1 1 240px;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
</style>
</head>
<body>
  <div class="search-wrapper">

    <!-- Google -->
    <div class="search-group">
      <div class="search-box">
        <div class="search-icon" onclick="doSearch('google')">
          <!-- Google "G" ロゴ (ダーク調) -->
          <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57C21.36 18.1 22.56 15.3 22.56 12.25z" fill="#5a5a5a"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#484848"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#525252"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#606060"/>
          </svg>
        </div>
        <input type="text" class="search-input" id="googleInput"
          placeholder="Googleで検索..."
          oninput="onInput('google')"
          onkeydown="onKeyDown(event,'google')"
          autocomplete="off"
        />
        <button class="clear-btn" id="googleClear" onclick="clearInput('google')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <button class="search-btn" onclick="doSearch('google')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- DuckDuckGo -->
    <div class="search-group">
      <div class="search-box">
        <div class="search-icon" onclick="doSearch('ddg')">
          <!-- DuckDuckGo アヒルロゴ (ダーク調) -->
          <svg width="20" height="20" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <!-- 体 -->
            <ellipse cx="50" cy="62" rx="28" ry="24" fill="#585858"/>
            <!-- 頭 -->
            <circle cx="50" cy="34" r="20" fill="#686868"/>
            <!-- くちばし -->
            <ellipse cx="68" cy="36" rx="10" ry="6" fill="#4a4a4a"/>
            <!-- 目 -->
            <circle cx="58" cy="28" r="4" fill="#888"/>
            <circle cx="59" cy="27" r="1.5" fill="#bbb"/>
            <!-- 尾 -->
            <ellipse cx="24" cy="68" rx="10" ry="6" fill="#4e4e4e" transform="rotate(-30 24 68)"/>
          </svg>
        </div>
        <input type="text" class="search-input" id="ddgInput"
          placeholder="DuckDuckGoで検索..."
          oninput="onInput('ddg')"
          onkeydown="onKeyDown(event,'ddg')"
          autocomplete="off"
        />
        <button class="clear-btn" id="ddgClear" onclick="clearInput('ddg')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <button class="search-btn" onclick="doSearch('ddg')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

<script>
  const config = {
    google: { input: 'googleInput', clear: 'googleClear', url: 'https://www.google.com/search?q=' },
    ddg:    { input: 'ddgInput',    clear: 'ddgClear',    url: 'https://duckduckgo.com/?q=' }
  };

  function onInput(engine) {
    const { input, clear } = config[engine];
    const val = document.getElementById(input).value;
    document.getElementById(clear).classList.toggle('visible', val.length > 0);
  }
  function onKeyDown(e, engine) {
    if (e.key === 'Enter') doSearch(engine);
  }
  function clearInput(engine) {
    const { input, clear } = config[engine];
    document.getElementById(input).value = '';
    document.getElementById(clear).classList.remove('visible');
    document.getElementById(input).focus();
  }
  function doSearch(engine) {
    const { input, url } = config[engine];
    const q = document.getElementById(input).value.trim();
    if (!q) return;
    window.open(url + encodeURIComponent(q), '_blank');
  }
</script>
</body>
</html>
